name: 24/7 Lofi Live Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante me auto-restart hoga taaki stream tute nahi

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Start Live Stream
      run: python script.py
